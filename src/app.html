<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#4d6fd4" />
		<!--
			FOUC prevention: resolve the stored theme preference (or follow the OS)
			before paint so there is no flash of the wrong colour scheme.
			Reads the raw 'app:theme' string directly — no JSON envelope — to stay
			dependency-free. Must run before %sveltekit.head%.
		-->
		<script>
			(function () {
				try {
					var c = localStorage.getItem('app:theme');
					var dark =
						c === 'dark' ||
						((c === 'system' || c === null) &&
							window.matchMedia('(prefers-color-scheme: dark)').matches);
					document.documentElement.dataset.theme = dark ? 'dark' : 'light';
				} catch (e) {
					document.documentElement.dataset.theme = 'light';
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
